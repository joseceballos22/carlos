#Enable growth particles
showParticles = true
#Use whitelist only. (will override blacklist and onlySaplingsAndCrops)
useWhitelistOnly = true
#Whitelist of blocks that will grow.
whiteList = ["minecraft:wheat", "minecraft:beetroots", "minecraft:carrots", "minecraft:potatoes", "minecraft:melon_stem", "minecraft:pumpkin_stem", "minecraft:bamboo_sapling", "minecraft:oak_sapling", "minecraft:spruce_sapling", "minecraft:birch_sapling", "minecraft:jungle_sapling", "minecraft:acacia_sapling", "minecraft:dark_oak_sapling", "supplementaries:flax", "thermal:flax", "thermal:rubberwood_sapling", "thermal:amaranth", "thermal:barley", "thermal:corn", "thermal:onion", "thermal:radish", "thermal:rice", "thermal:sadiroot", "thermal:spinach", "thermal:bell_pepper", "thermal:eggplant", "thermal:green_bean", "thermal:peanut", "thermal:strawberry", "thermal:tomato", "thermal:coffee", "thermal:hops", "thermal:tea", "thermal:frost_melon", "immersiveengineering:hemp", "minecraft:bamboo"]
#Blacklist of blocks that will not grow.
blackList = ["minecraft:grass_block", "minecraft:netherrack", "minecraft:grass_block", "minecraft:warped_nylium", "minecraft:crimson_nylium", "minecraft:tall_grass", "minecraft:grass", "botanypots", "gaiadimension", "aether:aether_grass_block", "aether:enchanted_aether_grass_block", "minecraft:red_mushroom", "minecraft:brown_mushroom", "undergarden:deepturf_block", "minecraft:peony", "minecraft:glow_lichen", "minecraft:fern", "minecraft:large_fern", "minecraft:rose_bush", "minecraft:lilac", "minecraft:sunflower", "minecraft:seagrass", "minecraft:tall_seagrass"]
#Only grow sapling tags and crop tags. (blacklist can exclude these)
onlySaplingsAndCrops = true
#The distance from the player to check for growth in blocks. (N S E W)
#Range: 1 ~ 20
playerDistance = 5
#The chance of growth applied by sprinting. (1 = 100%)
#Range: 0.0 ~ 1.0
sprintGrowthChance = 0.075
#The chance of growth applied by crouching. (1 = 100%)
#Range: 0.0 ~ 1.0
crouchGrowthChance = 0.5

